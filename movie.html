<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineVerse — Movie Details</title>
  <!-- Dynamic description injected by movie.js once the movie loads -->
  <meta name="description" content="View full details, trailers, cast, and similar movies on CineVerse." />
  <meta name="theme-color" content="#090C12" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/style.css?v=2" />
  <link rel="stylesheet" href="css/movie.css?v=2" />
  <link rel="stylesheet" href="css/responsive.css?v=2" />
  <link rel="stylesheet" href="css/animations.css?v=2" />
</head>
<body>

  <!-- ============ NAVBAR ============ -->
  <header class="navbar" id="navbar">
    <div class="navbar__inner">
      <a href="index.html" class="navbar__logo" aria-label="CineVerse Home">Cine<span>Verse</span></a>

      <nav class="navbar__links" id="navLinks" aria-label="Primary navigation">
        <a href="index.html"                class="navbar__link">Home</a>
        <a href="index.html#trending"       class="navbar__link">Trending</a>
        <a href="index.html#popular"        class="navbar__link">Popular</a>
        <a href="index.html?view=favorites" class="navbar__link" id="favoritesLink">Favorites</a>
      </nav>

      <div class="navbar__actions">
        <button class="navbar__theme-toggle" id="themeToggle" aria-label="Toggle dark/light theme">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
        <button class="navbar__hamburger" id="hamburger" aria-label="Open navigation menu" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
    <div class="filmstrip" aria-hidden="true"></div>
  </header>

  <!-- ============ LOADING STATE ============ -->
  <div id="movieDetailLoading" class="detail-loading" aria-live="polite">
    <span class="sr-only">Loading movie details…</span>
  </div>

  <!-- ============ MOVIE DETAIL ============ -->
  <section class="detail" id="movieDetail" hidden aria-label="Movie details">
    <div class="detail__backdrop" id="detailBackdrop" aria-hidden="true"></div>

    <div class="detail__content">
      <img class="detail__poster" id="detailPoster" src="" alt="" />

      <div class="detail__info">
        <h1 class="detail__title" id="detailTitle"></h1>

        <div class="detail__meta" id="detailMeta" aria-label="Movie metadata"></div>

        <div class="detail__genres" id="detailGenres" aria-label="Genres"></div>

        <p class="detail__overview" id="detailOverview"></p>

        <div class="detail__actions">
          <button class="btn btn--gold" id="trailerBtn" hidden aria-label="Watch official trailer">
            ▶ Watch Trailer
          </button>
          <button class="btn btn--ghost" id="detailFavoriteBtn">+ Add to Favorites</button>
        </div>
      </div>
    </div>
  </section>

  <div class="filmstrip" aria-hidden="true"></div>

  <!-- ============ TRAILER MODAL ============ -->
  <div class="modal" id="trailerModal" hidden role="dialog" aria-label="Movie trailer" aria-modal="true">
    <div class="modal__backdrop" id="modalBackdrop"></div>
    <div class="modal__content">
      <button class="modal__close" id="modalClose" aria-label="Close trailer">✕</button>
      <div class="modal__video" id="modalVideo"></div>
    </div>
  </div>

  <!-- ============ CAST ============ -->
  <section class="movie-section" id="castSection" hidden aria-label="Cast">
    <div class="movie-section__header">
      <h2 class="movie-section__title">Cast</h2>
    </div>
    <div class="movie-row" id="castRow" role="list"></div>
  </section>

  <!-- ============ SIMILAR MOVIES ============ -->
  <section class="movie-section" id="similarSection" hidden aria-label="Similar movies">
    <div class="movie-section__header">
      <h2 class="movie-section__title">You Might Also Like</h2>
    </div>
    <div class="movie-row" id="similarRow" role="list"></div>
  </section>

  <div class="filmstrip" aria-hidden="true"></div>

  <!-- ============ FOOTER ============ -->
  <footer class="footer" role="contentinfo">
    <div class="footer__inner">
      <a href="index.html" class="footer__logo" aria-label="CineVerse Home">Cine<span>Verse</span></a>
      <p class="footer__tagline">Your cinematic companion — powered by TMDb.</p>
      <div class="footer__tmdb" aria-label="Powered by TMDb">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="var(--color-gold)" aria-hidden="true">
          <path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>
        </svg>
        This product uses the TMDb API but is not endorsed or certified by TMDb.
      </div>
      <p class="footer__credit">© <span id="year"></span> CineVerse. For educational use only.</p>
    </div>
  </footer>

  <!-- ============ SCROLL-TO-TOP ============ -->
  <button class="scroll-top" id="scrollToTop" aria-label="Scroll back to top">↑</button>

  <!-- ============ TOAST CONTAINER ============ -->
  <div id="toastContainer" aria-live="polite" aria-atomic="false"></div>

  <!-- Scripts -->
  <script src="js/utils.js?v=4"></script>
  <script src="js/api.js?v=4"></script>
  <script src="js/favorites.js?v=4"></script>
  <script src="js/search.js?v=4"></script>
  <script src="js/app.js?v=4"></script>
  <script src="js/movie.js?v=4"></script>
</body>
</html>
